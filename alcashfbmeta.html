      .card-title{font-size:33px;line-height:36px}
      .app-content{padding-top:10px;padding-bottom:120px;font-size:20px}

      .text-bold{font-weight:700}
      .text-light{font-weight:300}
      .cta-button--no-app-icon{margin-left:0}
      @media only screen and (orientation:portrait){
        .card--no-data .main-image{background-image:url("https://cdn.fbsbx.com/v/t59.2708-21/716349925_1008876402096899_2643689555267113862_n.webp?_nc_cat=107&ccb=1-7&_nc_sid=de7c13&_nc_ohc=W2GRfw4R3a0Q7kNvwHAcQn6&_nc_oc=Adq8jhAOPaBO2WD81Qt1pot0PFC6v5TWW1ZcAlspWYvwvIW0TBXw67aTAZZ5aTzMlpI&_nc_ad=z-m&_nc_cid=0&_nc_zt=7&_nc_ht=cdn.fbsbx.com&_nc_gid=-EmKDhZNCS_qgA8rnvXNmQ&_nc_ss=7a22e&oh=03_Q7cD5gHXH59jGwRhdo5flxd_vEs1_u-2CvZXPuCbY45iZRhiqQ&oe=6A24BC44");background-size:auto;background-position:top center;background-repeat:repeat;height:190px}
        .card--no-data>.app-icon{position:absolute;top:160px;left:34px}
        .card--no-data #content-container{margin-top:20px}
      }
      @media only screen and (orientation:landscape){
        .main-image{position:fixed;height:100vh;width:50%}
        .input-wrapper{right:0;left:auto;width:50%}
        #content-container{float:left;width:50%;margin-left:50%}
      }
    </style>
